# Drop ntm (yet-another-tmux) spawn commands from atuin history.
# These carry inline CLAUDE_CODE_HOOKS JSON + systemd-run wrappers; without
# filtering they pollute fuzzy ↑-search with multi-kilobyte lines that match
# any substring (e.g. typing `claude --danger` surfaces the full spawn).
